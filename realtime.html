<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>beOtop — Disponibilité</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold:        #b8922a;
  --gold-light:  #d4aa50;
  --gold-pale:   #f8f2e4;
  --gold-border: rgba(184,146,42,.2);
  --navy:        #0d2d48;
  --navy-mid:    #1a4a6a;
  --sage:        #2a6a48;
  --green:       #1e8a50;
  --green-dim:   rgba(30,138,80,.1);
  --green-border:rgba(30,138,80,.25);
  --red:         #c04030;
  --red-dim:     rgba(192,64,48,.08);
  --red-border:  rgba(192,64,48,.2);
  --bg:          #f9f6f0;
  --bg2:         #ffffff;
  --text:        #1a1610;
  --muted:       #7a6e62;
  --border:      rgba(184,146,42,.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ── FOND ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 90% 5%, rgba(184,146,42,.07) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 5% 90%, rgba(13,45,72,.05) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

/* ── LAYOUT ── */
.shell {
  position: relative; z-index: 1;
  height: 100vh;
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  padding: 1.4rem 2.5rem;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(249,246,240,.92);
  backdrop-filter: blur(12px);
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem; font-weight: 300;
  color: var(--gold); letter-spacing: .08em;
}
.logo b { font-weight: 600; }

.site-name {
  font-size: .7rem; font-weight: 400;
  color: var(--muted); letter-spacing: .18em;
  text-transform: uppercase; margin-top: .2rem;
}

.header-center {
  text-align: center;
}

.header-time {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.2rem; font-weight: 300;
  color: var(--navy); letter-spacing: .04em; line-height: 1;
}

.header-date {
  font-size: .68rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: .15em;
  margin-top: .2rem;
}

.header-right {
  text-align: right;
}

.live-badge {
  display: inline-flex; align-items: center; gap: .45rem;
  background: var(--green-dim); border: 1px solid var(--green-border);
  border-radius: 100px; padding: .3rem .9rem;
  font-size: .7rem; font-weight: 500; letter-spacing: .08em;
  color: var(--green); text-transform: uppercase;
}

.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  animation: pulse-g 2s ease-in-out infinite;
}

@keyframes pulse-g { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

.last-update {
  font-size: .62rem; color: var(--muted);
  margin-top: .4rem; font-weight: 300;
}

/* ── STATS BAR ── */
.stats-bar {
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,.7);
}

.stat {
  flex: 1; padding: .9rem 2rem;
  display: flex; align-items: center; gap: 1rem;
  border-right: 1px solid var(--border);
}
.stat:last-child { border-right: none; }

.stat-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.2rem; font-weight: 600;
  line-height: 1; color: var(--gold);
  min-width: 2rem; text-align: center;
}
.stat-val.green { color: var(--green); }
.stat-val.red   { color: var(--red); }

.stat-info {}
.stat-label {
  font-size: .62rem; font-weight: 500;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: .12em;
}
.stat-sub { font-size: .58rem; color: var(--muted); margin-top: .1rem; font-weight: 300; }

/* ── GRILLE PRINCIPALE ── */
.grid-wrap {
  overflow-y: auto; padding: 1.4rem 2rem;
}
.grid-wrap::-webkit-scrollbar { width: 3px; }
.grid-wrap::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }

.grid-title {
  font-size: .6rem; font-weight: 500; letter-spacing: .2em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 1rem;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: .8rem;
}

/* ── CARTE ATELIER ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.2rem 1.3rem;
  position: relative; overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.07); }

.card::before {
  content: ''; position: absolute;
  top: 0; left: 0; bottom: 0; width: 4px;
  border-radius: 14px 0 0 14px;
  transition: background .4s;
}
.card.libre::before   { background: var(--green); }
.card.occupe::before  { background: var(--red); }
.card.inconnu::before { background: var(--border); }

/* Fond subtil selon statut */
.card.libre  { background: linear-gradient(135deg, #fff, rgba(30,138,80,.025)); }
.card.occupe { background: linear-gradient(135deg, #fff, rgba(192,64,48,.025)); }

.card-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; margin-bottom: .7rem;
}

.card-icon { font-size: 1.5rem; margin-bottom: .3rem; }

.card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem; font-weight: 600;
  color: var(--navy); line-height: 1.2;
}
.card-indication {
  font-size: .62rem; color: var(--muted);
  margin-top: .15rem; font-weight: 300;
}

.status-pill {
  display: inline-flex; align-items: center; gap: .35rem;
  border-radius: 100px; padding: .28rem .75rem;
  font-size: .65rem; font-weight: 500;
  letter-spacing: .06em; text-transform: uppercase;
  white-space: nowrap;
}
.status-pill.libre  { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
.status-pill.occupe { background: var(--red-dim); color: var(--red); border: 1px solid var(--red-border); }
.status-pill.inconnu { background: rgba(122,110,98,.06); color: var(--muted); border: 1px solid rgba(122,110,98,.12); }

.status-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.status-dot.libre  { background: var(--green); animation: pulse-g 2s ease-in-out infinite; }
.status-dot.occupe { background: var(--red); animation: pulse-r 1.5s ease-in-out infinite; }
.status-dot.inconnu { background: var(--muted); }
@keyframes pulse-r { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.7)} }

.card-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: .6rem;
}
.session-info { font-size: .62rem; color: var(--muted); font-weight: 300; }
.session-info strong { color: var(--text); font-weight: 500; }

/* Barre session */
.session-bar {
  height: 3px; background: rgba(0,0,0,.06);
  border-radius: 10px; overflow: hidden; margin-top: .6rem;
}
.session-bar-fill {
  height: 100%; border-radius: 10px; transition: width 1s ease;
}
.libre  .session-bar-fill { background: var(--green); }
.occupe .session-bar-fill { background: var(--red); }

/* ── FAISCEAU ── */
.faisceau-bar {
  margin: 0 2rem; margin-bottom: .8rem;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 1rem 1.4rem;
  display: flex; align-items: center; justify-content: space-between; gap: 1.5rem;
}
.faisceau-left { display: flex; align-items: center; gap: .8rem; }
.faisceau-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: var(--gold-pale); border: 1px solid var(--gold-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
}
.faisceau-label { font-size: .7rem; font-weight: 500; color: var(--navy); letter-spacing: .08em; }
.faisceau-sub   { font-size: .6rem; color: var(--muted); margin-top: .1rem; }
.faisceau-right { display: flex; align-items: baseline; gap: .3rem; }
.faisceau-count {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem; font-weight: 600; color: var(--gold);
}
.faisceau-unit { font-size: .65rem; color: var(--muted); font-weight: 300; }

/* ── FOOTER ── */
footer {
  padding: .6rem 2.5rem;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border);
  background: rgba(249,246,240,.92);
  backdrop-filter: blur(12px);
}
.footer-left { font-size: .58rem; color: var(--muted); letter-spacing: .1em; }
.footer-right { font-size: .58rem; color: var(--muted); }

/* ── LOADING ── */
.loading {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity .5s;
}
.loading.hidden { opacity: 0; pointer-events: none; }
.loading-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3rem; font-weight: 300;
  color: var(--gold); letter-spacing: .1em; margin-bottom: 1.5rem;
}
.dots { display: flex; gap: .5rem; }
.dots span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--gold);
  animation: bounce 1.2s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: .15s; }
.dots span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.3} 40%{transform:translateY(-10px);opacity:1} }

/* ── RESPONSIVE ── */
@media (max-width:700px) {
  header { padding: 1rem 1.2rem; }
  .header-center { display: none; }
  .stats-bar .stat { padding: .7rem 1rem; }
  .grid-wrap { padding: 1rem; }
  .faisceau-bar { margin: 0 1rem .8rem; }
  footer { padding: .5rem 1.2rem; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-logo">be<b style="font-weight:600">Otop</b></div>
  <div class="dots"><span></span><span></span><span></span></div>
</div>

<div class="shell">

  <header>
    <div>
      <div class="logo">be<b>Otop</b></div>
      <div class="site-name" id="site-name">Chargement…</div>
    </div>
    <div class="header-center">
      <div class="header-time" id="clock">—</div>
      <div class="header-date" id="clock-date">—</div>
    </div>
    <div class="header-right">
      <div class="live-badge"><span class="live-dot"></span>En direct</div>
      <div class="last-update" id="last-update">—</div>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val green" id="stat-libres">—</div>
      <div class="stat-info">
        <div class="stat-label">Ateliers libres</div>
        <div class="stat-sub">Disponibles maintenant</div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-val red" id="stat-occupes">—</div>
      <div class="stat-info">
        <div class="stat-label">En cours</div>
        <div class="stat-sub">Sessions actives</div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-passages">—</div>
      <div class="stat-info">
        <div class="stat-label">Passages aujourd'hui</div>
        <div class="stat-sub">Faisceau infrarouge</div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-total">—</div>
      <div class="stat-info">
        <div class="stat-label">Ateliers total</div>
        <div class="stat-sub">Équipements actifs</div>
      </div>
    </div>
  </div>

  <div class="grid-wrap">
    <div class="grid-title">État des ateliers de récupération</div>
    <div class="grid" id="grid"></div>
  </div>

  <footer>
    <div class="footer-left">beOtop™ · Espace de Revitalisation · <span id="footer-site">—</span></div>
    <div class="footer-right">Rafraîchissement automatique · 15s</div>
  </footer>

</div>

<script>
'use strict';

const API     = '';          /* relatif — servi par Flask */
const SITE    = 'dmmf-agde'; /* injecté par Flask si besoin */
const REFRESH = 15000;

const META = {
  'Méridienne P127':         { icon:'🪑', indication:'TMS · Position 127° · Lombaires' },
  'Cocon de Sieste':         { icon:'😴', indication:'Fatigue · Récupération profonde' },
  'Neurosonic Lit':          { icon:'🛏️', indication:'Relaxation · Vibrations sonores' },
  "Bol d'Air Jacquier":      { icon:'🌬️', indication:'Fatigue cognitive · Oxygénation' },
  'Transat 127':             { icon:'🛋️', indication:'Détente · Anti-gravité' },
  'Siège Massant 0 Gravité': { icon:'💆', indication:'TMS · Stress · Massage' },
  'Siège Massant Shiatsu':   { icon:'🎵', indication:'TMS · Stress · Shiatsu' },
  'Siège Lecture':           { icon:'📖', indication:'Détente · Posture assise' },
  'Sensosphère':             { icon:'🌟', indication:'Luminothérapie · Chronobiologie' },
  'Bain de Lumière Rouge':   { icon:'💡', indication:'Régénération · Photobiomodulation' },
  'Photobiomodulation':      { icon:'✨', indication:'TMS · Régénération cellulaire' },
  'Lunettes Psio':           { icon:'👓', indication:'Déconnexion · Relaxation visuelle' },
};

/* ── Horloge ── */
function tickClock() {
  const now  = new Date();
  const time = now.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  const date = now.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
  document.getElementById('clock').textContent      = time;
  document.getElementById('clock-date').textContent = date.charAt(0).toUpperCase() + date.slice(1);
}
tickClock();
setInterval(tickClock, 1000);

/* ── Timers de session ── */
const sessionTimers = {};

function startTimer(atelier) {
  if (sessionTimers[atelier]) return;
  const start = Date.now();
  sessionTimers[atelier] = setInterval(() => {
    const elapsed = Math.floor((Date.now() - start) / 1000);
    const m = Math.floor(elapsed / 60), s = elapsed % 60;
    const label = m > 0 ? m + 'min ' + (s > 0 ? s + 's' : '') : s + 's';
    const card = document.querySelector('[data-at="' + atelier + '"]');
    if (!card) return;
    const info = card.querySelector('.session-info');
    const bar  = card.querySelector('.session-bar-fill');
    if (info) info.innerHTML = 'En cours depuis <strong>' + label.trim() + '</strong>';
    if (bar)  bar.style.width = Math.min(elapsed / 1800 * 100, 100) + '%';
  }, 1000);
}

function stopTimer(atelier) {
  if (sessionTimers[atelier]) {
    clearInterval(sessionTimers[atelier]);
    delete sessionTimers[atelier];
  }
}

/* ── Rendu grille ── */
function renderGrid(occ) {
  const grid = document.getElementById('grid');
  const ateliers = [...new Set([...Object.keys(META), ...Object.keys(occ)])];
  let libres = 0, occupes = 0;

  ateliers.forEach(nom => {
    const raw    = occ[nom];
    const status = raw === undefined ? 'inconnu' : raw ? 'occupe' : 'libre';
    const meta   = META[nom] || { icon:'⚙️', indication:'' };
    if (status === 'libre')  libres++;
    if (status === 'occupe') occupes++;

    let card = document.querySelector('[data-at="' + nom + '"]');

    if (!card) {
      card = document.createElement('div');
      card.className = 'card ' + status;
      card.setAttribute('data-at', nom);
      card.innerHTML =
        '<div class="card-top">' +
          '<div>' +
            '<div class="card-icon">' + meta.icon + '</div>' +
            '<div class="card-name">' + nom + '</div>' +
            '<div class="card-indication">' + meta.indication + '</div>' +
          '</div>' +
          '<div class="status-pill ' + status + '">' +
            '<span class="status-dot ' + status + '"></span>' +
            '<span class="status-text">' + (status === 'libre' ? 'Libre' : status === 'occupe' ? 'Occupé' : '—') + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="session-bar"><div class="session-bar-fill" style="width:0%"></div></div>' +
        '<div class="card-footer">' +
          '<div class="session-info">' + (status === 'occupe' ? 'En cours...' : status === 'libre' ? 'Disponible' : 'Non mesuré') + '</div>' +
        '</div>';
      grid.appendChild(card);
    } else {
      /* Mise à jour si statut changé */
      const prev = card.classList.contains('occupe') ? 'occupe' : card.classList.contains('libre') ? 'libre' : 'inconnu';
      if (prev !== status) {
        card.className = 'card ' + status;
        card.querySelector('.status-pill').className  = 'status-pill ' + status;
        card.querySelector('.status-dot').className   = 'status-dot ' + status;
        card.querySelector('.status-text').textContent = status === 'libre' ? 'Libre' : status === 'occupe' ? 'Occupé' : '—';
        const info = card.querySelector('.session-info');
        const bar  = card.querySelector('.session-bar-fill');
        if (status === 'libre') {
          if (info) info.textContent = 'Disponible';
          if (bar)  bar.style.width  = '0%';
          stopTimer(nom);
        } else if (status === 'occupe') {
          startTimer(nom);
        }
      }
    }

    if (status === 'occupe' && !sessionTimers[nom]) startTimer(nom);
  });

  document.getElementById('stat-libres').textContent  = libres;
  document.getElementById('stat-occupes').textContent = occupes;
  document.getElementById('stat-total').textContent   = ateliers.length;
}

/* ── Refresh principal ── */
async function refresh() {
  try {
    const [rOcc, rPass] = await Promise.all([
      fetch(API + '/api/sensors/occupation/current?site_slug=' + SITE),
      fetch(API + '/api/sensors/passages/today?site_slug=' + SITE)
    ]);

    if (!rOcc.ok) throw new Error('occupation');
    const occData  = await rOcc.json();
    const passData = rPass.ok ? await rPass.json() : {};

    renderGrid(occData.ateliers || {});

    document.getElementById('stat-passages').textContent = passData.passages_today ?? '—';
    document.getElementById('site-name').textContent     = 'Espace de Revitalisation';
    document.getElementById('footer-site').textContent   = SITE;
    document.getElementById('last-update').textContent   =
      'Mis à jour à ' + new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

    document.getElementById('loading').classList.add('hidden');

  } catch(e) {
    document.getElementById('last-update').textContent = '⚠ Erreur connexion — nouvelle tentative dans 15s';
    console.error(e);
  }
}

refresh();
setInterval(refresh, REFRESH);
</script>
</body>
</html>
